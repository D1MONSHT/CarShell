name: Build and Release Version

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Get version from VersionInfo.cs
        id: version
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path "CarShell" -Recurse -Filter "VersionInfo.cs" |
            Select-Object -First 1

          if (-not $file) {
            throw "VersionInfo.cs not found"
          }

          $content = Get-Content $file.FullName -Raw

          if ($content -match 'Version\s*=\s*"([^"]+)"') {
            $version = $matches[1].Trim().TrimStart("v", "V")
          }
          else {
            throw "Version not found in VersionInfo.cs"
          }

          $tag = "v$version"

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          Write-Host "Version: $version"
          Write-Host "Tag: $tag"

      - name: Create git tag if not exists
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          git fetch --tags

          if (git tag -l $tag) {
            Write-Host "Tag $tag already exists"
          }
          else {
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            git tag $tag
            git push origin $tag
          }

      - name: Clean output directories
        shell: pwsh
        run: |
          Remove-Item "publish" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "updater-publish" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "CarShell-win-x64.zip" -Force -ErrorAction SilentlyContinue

      - name: Restore CarShell
        shell: pwsh
        run: dotnet restore "CarShell/CarShell.csproj"

      - name: Restore Updater
        shell: pwsh
        run: dotnet restore "Updater/Updater.csproj"

      - name: Publish CarShell
        shell: pwsh
        run: |
          dotnet publish "CarShell/CarShell.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -o "publish" `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Publish Updater
        shell: pwsh
        run: |
          dotnet publish "Updater/Updater.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -o "updater-publish" `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Add Updater to release
        shell: pwsh
        run: |
          if (-not (Test-Path "updater-publish/Updater.exe")) {
            Get-ChildItem "updater-publish" -Recurse
            throw "Updater.exe was not created"
          }

          Copy-Item `
            -Path "updater-publish/Updater.exe" `
            -Destination "publish/Updater.exe" `
            -Force

      - name: Remove Maps and unnecessary files
        shell: pwsh
        run: |
          Remove-Item "publish/Maps" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "publish/maps" -Recurse -Force -ErrorAction SilentlyContinue

          Get-ChildItem "publish" -Recurse -Filter "*.pmtiles" |
            Remove-Item -Force -ErrorAction SilentlyContinue

          Get-ChildItem "publish" -Recurse -Filter "*.pdb" |
            Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Verify release files
        shell: pwsh
        run: |
          if (-not (Test-Path "publish/CarShell.exe")) {
            throw "CarShell.exe not found"
          }

          if (-not (Test-Path "publish/Updater.exe")) {
            throw "Updater.exe not found"
          }

          $mapFiles = Get-ChildItem `
            -Path "publish" `
            -Recurse `
            -Filter "*.pmtiles" `
            -ErrorAction SilentlyContinue

          if ($mapFiles) {
            throw "PMTiles files are still present"
          }

          Get-ChildItem "publish" -Recurse |
            Select-Object FullName, Length

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "publish/*" `
            -DestinationPath "CarShell-win-x64.zip" `
            -CompressionLevel Optimal `
            -Force

          if (-not (Test-Path "CarShell-win-x64.zip")) {
            throw "ZIP archive was not created"
          }

          $zip = Get-Item "CarShell-win-x64.zip"
          $size = [math]::Round($zip.Length / 1MB, 2)

          Write-Host "ZIP size: $size MB"

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: CarShell ${{ steps.version.outputs.version }}
          body: |
            Автоматическая сборка CarShell ${{ steps.version.outputs.version }}.

            В архив входят:
            - CarShell
            - Updater

            В архив не входят:
            - папка Maps
            - файлы PMTiles
            - отладочные PDB-файлы
          files: CarShell-win-x64.zip
          make_latest: true
          overwrite_files: true
