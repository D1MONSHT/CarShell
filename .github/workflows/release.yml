name: Build and Update Latest Release

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CarShell.sln

      - name: Publish CarShell
        run: >
          dotnet publish CarShell/CarShell.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:DebugType=None
          /p:DebugSymbols=false

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath CarShell-win-x64.zip -Force

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: CarShell Latest
          body: |
            Автоматическая сборка последней версии CarShell.

            Файл для обновления:
            CarShell-win-x64.zip
          files: CarShell-win-x64.zip